<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profile - Soltistix</title>
<link rel="icon" type="image/svg+xml" href="../assets/logo.svg">
<link rel="stylesheet" href="../assets/css/global.css">
<style>
.profile-hero {
  background: var(--black);
  padding: calc(var(--nav-h) + 56px) 0 0;
  position: relative;
  overflow: hidden;
}
.ph-blob-1 {
  position: absolute;
  width: 380px;
  height: 380px;
  background: var(--purple);
  opacity: 0.07;
  border-radius: 60% 40% 70% 30% / 40% 60% 30% 70%;
  top: -60px;
  right: -60px;
  animation: blobFloat 12s ease-in-out infinite;
}
.ph-blob-2 {
  position: absolute;
  width: 220px;
  height: 220px;
  background: var(--teal);
  opacity: 0.06;
  border-radius: 40% 60% 30% 70% / 60% 40% 70% 30%;
  bottom: 0;
  left: 25%;
  animation: blobFloat 9s ease-in-out infinite reverse;
}
.profile-top {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 40px;
  align-items: end;
  padding-bottom: 48px;
  position: relative;
  z-index: 2;
}
.avatar-xl {
  width: 110px;
  height: 110px;
  background: linear-gradient(135deg, var(--blue), var(--teal));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 3.5rem;
  font-weight: 900;
  color: var(--white);
  flex-shrink: 0;
  box-shadow: 0 8px 32px rgba(58,180,242,0.3);
}
.profile-name {
  font-family: var(--font-display);
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 900;
  color: var(--cream);
  line-height: 0.9;
  letter-spacing: -0.03em;
  font-style: italic;
}
.profile-email {
  font-size: 0.82rem;
  color: #555;
  margin-top: 8px;
}
.role-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
}
.role-tag .tag {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.16);
  color: var(--cream);
}
.role-tag .tag.tag-active {
  background: var(--teal);
  border-color: var(--teal);
  color: var(--black);
}
.tabs-bar {
  display: flex;
  gap: 0;
  border-top: 1.5px solid rgba(255,255,255,0.06);
  position: relative;
  z-index: 2;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 16px 28px;
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 600;
  background: none;
  border: none;
  border-right: 1.5px solid rgba(255,255,255,0.06);
  color: #555;
  cursor: none;
  transition: all 0.15s;
  letter-spacing: 0.02em;
  white-space: nowrap;
  flex-shrink: 0;
}
.tab-btn:last-child { border-right: none; }
.tab-btn.active {
  color: var(--yellow);
  border-bottom: 3px solid var(--yellow);
}
.tab-btn:hover:not(.active) { color: var(--cream); }
.panel {
  display: none;
  padding: 48px 0 80px;
}
.panel.active { display: block; }
.stat-strip {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  margin-bottom: 40px;
}
.stat-cell {
  background: var(--white);
  border: 2px solid rgba(17,17,17,0.07);
  border-radius: var(--radius-lg);
  padding: 24px;
  text-align: center;
  transition: transform 0.15s var(--ease);
}
.stat-cell:hover { transform: translateY(-3px); }
.stat-val {
  font-family: var(--font-display);
  font-size: 2.5rem;
  font-weight: 900;
  color: var(--black);
  letter-spacing: -0.03em;
}
.stat-key {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #888;
  margin-top: 4px;
}
.pay-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 0;
  border-bottom: 1.5px solid rgba(17,17,17,0.07);
}
.pay-row:last-of-type { border-bottom: none; }
.pay-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(17,17,17,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}
.pay-amount {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 900;
  letter-spacing: -0.02em;
}
.pay-credit { color: var(--teal); }
.pay-debit { color: var(--pink); }
.profile-grid {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 40px;
}
@media(max-width:900px){
  .profile-top { grid-template-columns: 1fr; }
  .stat-strip { grid-template-columns: 1fr 1fr; }
  .profile-grid { grid-template-columns: 1fr; }
}
@media(max-width:640px){
  .profile-top { gap: 24px; padding-bottom: 32px; }
  .avatar-xl { width: 88px; height: 88px; font-size: 2.8rem; }
  .stat-strip { grid-template-columns: 1fr; }
  .tabs-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: visible;
  }
  .tab-btn {
    padding: 14px 16px;
    border-right: 1.5px solid rgba(255,255,255,0.06);
    border-bottom: 1.5px solid rgba(255,255,255,0.06);
  }
  .tab-btn:nth-child(2n) { border-right: none; }
}
@media(max-width:560px){
  .tabs-bar { grid-template-columns: 1fr; }
  .tab-btn { border-right: none; }
  .panel { padding: 34px 0 52px; }
}
</style>
</head>
<body>
<div class="noise-overlay"></div>
<nav class="navbar" id="navbar"></nav>
<div id="toast-container"></div>

<div class="profile-hero">
  <div class="ph-blob-1"></div>
  <div class="ph-blob-2"></div>
  <div class="container">
    <div class="profile-top">
      <div class="avatar-xl" id="p-avatar">?</div>
      <div>
        <div class="profile-name" id="p-name">Loading</div>
        <div class="profile-email" id="p-email"></div>
        <div class="role-tag" id="p-role"></div>
      </div>
    </div>
  </div>
  <div class="tabs-bar" id="tab-bar">
    <button class="tab-btn active" onclick="switchPanel('overview',this)">Overview</button>
    <button class="tab-btn" onclick="switchPanel('payments',this)">Payments</button>
    <button class="tab-btn" onclick="switchPanel('notifications',this)">Notifications</button>
    <button class="tab-btn" onclick="switchPanel('settings',this)">Settings</button>
  </div>
</div>

<div style="background:var(--cream)">
  <div class="container">
    <div class="panel active" id="panel-overview">
      <div class="stat-strip">
        <div class="stat-cell"><div class="stat-val" id="stat-tix">0</div><div class="stat-key">Tickets Held</div></div>
        <div class="stat-cell"><div class="stat-val" id="stat-shows">0</div><div class="stat-key">Shows Attended</div></div>
        <div class="stat-cell"><div class="stat-val" id="stat-spent">0.00</div><div class="stat-key">SGD Spent</div></div>
      </div>
      <div class="section-label mb-16">Recent Activity</div>
      <div class="card" id="activity-list">
        <div class="skel" style="height:56px;margin-bottom:8px;border-radius:var(--radius)"></div>
        <div class="skel" style="height:56px;margin-bottom:8px;border-radius:var(--radius)"></div>
        <div class="skel" style="height:56px;border-radius:var(--radius)"></div>
      </div>
    </div>

    <div class="panel" id="panel-payments">
      <div class="section-label mb-24">Payment History</div>
      <div class="card" id="payment-list"><div style="text-align:center;padding:40px;font-family:var(--font-display);font-size:1.5rem;font-weight:900;color:#aaa">Loading...</div></div>
    </div>

    <div class="panel" id="panel-notifications">
      <div class="section-label mb-24">Notification Log</div>
      <div class="card" id="notif-list"><div style="text-align:center;padding:40px;font-family:var(--font-display);font-size:1.5rem;font-weight:900;color:#aaa">Loading...</div></div>
    </div>

    <div class="panel" id="panel-settings">
      <div class="profile-grid">
        <div>
          <div class="section-label mb-24">Account Settings</div>
          <div class="card">
            <div class="form-group"><label class="form-label">Display Name</label><input class="form-input" id="s-name"></div>
            <div class="form-group"><label class="form-label">Account Email</label><input class="form-input" id="s-email" type="email" readonly></div>
            <div class="divider mt-16 mb-16"></div>
            <div class="form-group"><label class="form-label">Contact Email For Notifications</label><input class="form-input" id="s-contact-email" type="email" placeholder="you@example.com" autocomplete="email"></div>
            <div class="form-group"><label class="form-label">Contact Phone For Notifications</label><input class="form-input" id="s-contact-phone" type="tel" placeholder="+6591234567 or 91234567" autocomplete="tel"></div>
            <button class="btn btn-black w-full" onclick="saveSettings()" style="border-radius:var(--radius)">Save Changes →</button>
            <div class="divider mt-24 mb-24"></div>
            <button class="btn w-full" style="border-color:var(--pink);color:var(--pink);border-radius:var(--radius)" onclick="Auth.logout()">Sign Out x</button>
          </div>
        </div>
        <div>
          <div class="section-label mb-24">Preferences</div>
          <div class="card">
            <p style="font-size:0.85rem;color:#888;line-height:1.7">Notification preferences, payment methods, and other settings would appear here in production.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../assets/js/api.js"></script>
<script>
const user = Auth.require();
renderNav();

let profileConcertIndex = {};
let profileLiveSyncUnsub = null;

function switchPanel(name, button){
  document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(tab => tab.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  button.classList.add('active');
  if(name === 'payments' && !document.getElementById('payment-list').dataset.loaded) loadPayments();
  if(name === 'notifications' && !document.getElementById('notif-list').dataset.loaded) loadNotifs();
}

function activatePanelFromQuery(){
  const target=(Util.getParam('tab')||Util.getParam('panel')||'').toLowerCase();
  if(target!=='settings') return;
  const settingsBtn=[...document.querySelectorAll('#tab-bar .tab-btn')].find(btn=>btn.textContent.trim()==='Settings');
  if(settingsBtn) switchPanel('settings', settingsBtn);
}

function init(){
  document.getElementById('p-avatar').textContent=user.name[0];
  document.getElementById('p-name').textContent=user.name;
  document.getElementById('p-email').textContent=user.email;
  document.getElementById('p-role').innerHTML=user.role==='admin'
    ?`<span class="tag tag-active">👑 Administrator</span>`
    :`<span class="tag">Customer</span>`;
  document.getElementById('s-name').value=user.name;
  document.getElementById('s-email').value=user.email;
  if(user.role==='admin'){
    document.querySelectorAll('#tab-bar .tab-btn').forEach((btn,index)=>{
      if(index < 3) btn.remove();
    });
    ['overview','payments','notifications'].forEach(panel=>{
      document.getElementById(`panel-${panel}`)?.remove();
    });
    const settingsBtn=document.querySelector('#tab-bar .tab-btn');
    settingsBtn?.classList.add('active');
    document.getElementById('panel-settings')?.classList.add('active');
    return;
  }
  loadContactSettings();
  loadActivity();
  activatePanelFromQuery();
}

function normalizePhoneInput(value=''){
  return String(value).replace(/[^\d+\s()-]/g,'').trim();
}

function toE164Phone(value=''){
  const cleaned=normalizePhoneInput(value).replace(/[\s()-]/g,'');
  if(/^\+[1-9]\d{7,14}$/.test(cleaned)) return cleaned;
  if(/^\d{8}$/.test(cleaned)) return `+65${cleaned}`;
  return null;
}

function isValidEmail(value=''){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(value||'').trim());
}

async function loadContactSettings(){
  const cEmail=document.getElementById('s-contact-email');
  const cPhone=document.getElementById('s-contact-phone');
  const cached=ContactProfile.readCached(user?.userId)||{};

  if(cEmail && !cEmail.value){
    cEmail.value=(cached?.email||user?.contactEmail||user?.email||'').trim();
  }
  if(cPhone && !cPhone.value){
    cPhone.value=(cached?.phoneNumber||user?.contactPhone||user?.phone||'').trim();
  }

  try{
    const contact=await ContactProfile.fetch(user);
    if(cEmail) cEmail.value=(contact?.email||cached?.email||user?.contactEmail||user?.email||'').trim();
    if(cPhone) cPhone.value=(contact?.phoneNumber||cached?.phoneNumber||user?.contactPhone||user?.phone||'').trim();
  }catch{
    if(cEmail && !cEmail.value) cEmail.value=(cached?.email||user?.contactEmail||user?.email||'').trim();
    if(cPhone && !cPhone.value) cPhone.value=(cached?.phoneNumber||user?.contactPhone||user?.phone||'').trim();
  }
}

function mapNotificationActivity(notification){
  const subject = String(notification?.subject || '').trim();
  const eventType = String(notification?.eventType || 'Notification').replace(/_/g, ' ');
  return {
    icon: '📩',
    label: subject || eventType,
    sub: [notification?.channel, notification?.status].filter(Boolean).join(' · ') || 'Notification update',
    at: notification?.sentAt || notification?.createdAt,
  };
}

function renderActivityRows(activity){
  const list = document.getElementById('activity-list');
  if(!activity.length){
    list.innerHTML = '<div style="text-align:center;padding:40px;font-family:var(--font-display);font-size:1.5rem;font-weight:900;color:#aaa">No recent activity yet</div>';
    return;
  }
  list.innerHTML = activity.map(item => `
    <div class="pay-row">
      <div class="pay-icon">${item.icon}</div>
      <div style="flex:1"><div style="font-weight:600;font-size:0.85rem">${item.label}</div><div class="text-xs text-muted">${item.sub}</div></div>
      <div class="text-xs text-muted">${getProfileRelativeTime(item.at)}</div>
    </div>`).join('');
}

function setupProfileLiveSync(){
  if(profileLiveSyncUnsub) profileLiveSyncUnsub();
  let timer = null;
  const schedule = () => {
    clearTimeout(timer);
    timer = setTimeout(() => {
      loadActivity({ silent: true });
      if(document.getElementById('payment-list').dataset.loaded) loadPayments();
      if(document.getElementById('notif-list').dataset.loaded) loadNotifs();
    }, 350);
  };
  profileLiveSyncUnsub = LiveSync.on(schedule);
  window.addEventListener('focus', schedule);
  document.addEventListener('visibilitychange', () => {
    if(document.visibilityState === 'visible') schedule();
  });
}

async function loadActivity({ silent = false } = {}){
  const activityList = document.getElementById('activity-list');
  if(!silent){
    activityList.innerHTML = `
      <div class="skel" style="height:56px;margin-bottom:8px;border-radius:var(--radius)"></div>
      <div class="skel" style="height:56px;margin-bottom:8px;border-radius:var(--radius)"></div>
      <div class="skel" style="height:56px;border-radius:var(--radius)"></div>
    `;
  }

  try{
    const [concertsRes, paymentsRes, notificationsRes] = await Promise.all([
      API.concerts.list(),
      API.payment.byUser(user.userId),
      API.notification.byUser(user.userId),
    ]);
    const concerts = concertsRes?.concerts || concertsRes || [];
    profileConcertIndex = Object.fromEntries(concerts.filter(concert => concert?.concertId).map(concert => [concert.concertId, concert]));

    const concertIds = concerts.map(concert => concert.concertId).filter(Boolean);
    const ticketResults = await Promise.allSettled(concertIds.map(concertId => API.tickets.list(concertId, 'ALL')));
    const tickets = ticketResults.flatMap(result => result.value?.tickets || []).filter(ticket => ticket?.ownerId === user.userId);
    const ticketMap = Object.fromEntries(tickets.filter(ticket => ticket?.ticketId).map(ticket => [ticket.ticketId, ticket]));

    const payments = paymentsRes?.payments || [];
    const notifications = notificationsRes?.notifications || [];
    renderOverviewStats(payments, tickets);

    const activity = [
      ...payments
        .filter(payment => String(payment?.status || '').toUpperCase() === 'SUCCESS')
        .map(payment => mapPaymentActivity(payment, ticketMap))
        .filter(Boolean),
      ...tickets.map(mapTicketActivity).filter(Boolean),
      ...notifications.map(mapNotificationActivity).filter(Boolean),
    ]
      .filter(item => item?.at)
      .sort((a, b) => new Date(b.at).getTime() - new Date(a.at).getTime())
      .slice(0, 6);

    renderActivityRows(activity);
  }catch{
    if(!silent){
      activityList.innerHTML = '<div style="text-align:center;padding:40px;font-family:var(--font-display);font-size:1.5rem;font-weight:900;color:#aaa">Could not load activity</div>';
    }
  }
}

async function loadPayments(){
  const list = document.getElementById('payment-list');
  list.dataset.loaded = '1';
  try{
    const d = await API.payment.byUser(user.userId);
    const pays = d.payments || [];
    if(!pays.length){
      list.innerHTML = '<div style="text-align:center;padding:40px;font-family:var(--font-display);font-size:1.5rem;font-weight:900;color:#aaa">No payments yet</div>';
      return;
    }
    list.innerHTML = pays.map(payment => {
      const isRefund = payment.type === 'REFUND';
      return `<div class="pay-row">
        <div class="pay-icon" style="background:${isRefund ? 'rgba(245,197,24,0.15)' : 'rgba(17,17,17,0.06)'}">${isRefund ? '↩' : '💳'}</div>
        <div style="flex:1"><div style="font-weight:600;font-size:0.85rem">${payment.type.replace('_', ' ')}</div><div class="text-xs text-muted">${payment.ticketId} · ${Util.formatDateShort(payment.createdAt)}</div></div>
        <div class="pay-amount ${isRefund ? 'pay-credit' : 'pay-debit'}">${isRefund ? '+' : '-'}SGD ${payment.amount}</div>
      </div>`;
    }).join('');
  }catch{
    list.innerHTML = '<div style="text-align:center;padding:40px;font-family:var(--font-display);font-size:1.5rem;font-weight:900;color:#aaa">Could not load</div>';
  }
}

async function loadNotifs(){
  const list = document.getElementById('notif-list');
  list.dataset.loaded = '1';
  try{
    const d = await API.notification.byUser(user.userId);
    const notifs = d.notifications || [];
    if(!notifs.length){
      list.innerHTML = '<div style="text-align:center;padding:40px;font-family:var(--font-display);font-size:1.5rem;font-weight:900;color:#aaa">No notifications</div>';
      return;
    }
    list.innerHTML = notifs.map(notification => `
      <div class="pay-row">
        <div class="pay-icon" style="background:rgba(62,207,178,0.1)">📧</div>
        <div style="flex:1"><div style="font-weight:600;font-size:0.85rem">${notification.subject}</div><div class="text-xs text-muted">${notification.channel} · ${Util.formatDateShort(notification.sentAt)}</div></div>
        ${Util.tag(notification.status)}
      </div>`).join('');
  }catch{
    list.innerHTML = '<div style="text-align:center;padding:40px;font-family:var(--font-display);font-size:1.5rem;font-weight:900;color:#aaa">Could not load</div>';
  }
}

async function saveSettings(){
  const name=document.getElementById('s-name').value.trim();
  const contactEmail=(document.getElementById('s-contact-email')?.value||'').trim();
  const contactPhoneRaw=document.getElementById('s-contact-phone')?.value||'';
  const contactPhone=toE164Phone(contactPhoneRaw);
  if(!name){toast('Name cannot be empty','warning');return;}
  if(!isValidEmail(contactEmail)){toast('Enter a valid contact email','warning');return;}
  if(!contactPhone){toast('Enter a valid contact phone in E.164 (e.g. +6591234567)','warning');return;}

  try{
    await ContactProfile.save(user, {
      email: contactEmail,
      phoneNumber: contactPhone,
      smsOptIn: true,
    });
  }catch(e){
    toast(e?.message||'Could not save contact details right now','error');
    return;
  }

  const stored=Auth.getUser(); stored.name=name;
  localStorage.setItem('ctms_user',JSON.stringify(stored));
  document.getElementById('p-name').textContent=name;
  document.getElementById('p-avatar').textContent=name[0];
  document.getElementById('s-contact-phone').value=contactPhone;
  toast('Profile and contact details updated ✓','success');
}

init();
</script>
</body>
</html>
